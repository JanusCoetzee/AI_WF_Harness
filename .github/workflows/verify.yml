name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    name: verify loop (typecheck, lint, tests incl. eval regression)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install toolchain into .venv (paths match harness.config.yaml)
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet -r app/requirements.txt pytest pytest-cov ruff pyyaml
      - name: Run the same verify loop as local (scripts/verify.sh)
        run: scripts/verify.sh

  secret-scan:
    name: gitleaks (STD-005, full history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
