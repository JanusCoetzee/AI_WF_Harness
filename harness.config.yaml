# AI Workflow Harness — project configuration
# Copy into your repo root and edit the `verify` block to match your toolchain.

project:
  name: AI_WF_Harness          # adopting a repo? set your project name here —
                               # stop-verify-check enforces only once configured
  default_risk_tier: T2        # T1 | T2 | T3 — see risk_tiers below
  artifacts_dir: docs/harness  # PRD, ADRs, plans, state, gate evidence live here

# ---------------------------------------------------------------------------
# Risk tiers scale the ceremony. Assign per work item at G0; default above.
# ---------------------------------------------------------------------------
risk_tiers:
  T1:
    description: >
      Money movement, customer-facing, regulatory reporting, or handles data
      classified Confidential or above. Full ceremony.
    gates: [G0, G1, G2, G3, G4, G5, G6, G7]
    requires:
      threat_model: true
      adr_for_all_significant_decisions: true
      human_reviewers: 2          # four-eyes minimum
      eval_spec_for_ai_features: true
      progressive_rollout: true
      change_record: true         # formal change-management ticket before deploy
  T2:
    description: Internal tooling, batch jobs, non-customer-facing services.
    gates: [G0, G1, G3, G4, G5, G6, G7]   # G2 folds into G1 unless novel architecture
    requires:
      threat_model: lightweight   # STRIDE-per-boundary table only
      human_reviewers: 1
      eval_spec_for_ai_features: true
      progressive_rollout: false
      change_record: true
  T3:
    description: Sandboxes, spikes, throwaway prototypes. Never touches real data.
    gates: [G0, G3, G4]
    requires:
      human_reviewers: 0          # but T3 output cannot be promoted without re-tiering
      note: Promoting T3 code to T1/T2 restarts the workflow at G1.

# ---------------------------------------------------------------------------
# Brownfield fast path (stages B0/B1, gate GC) — most day-to-day work.
# GC replaces G0-G3; the pipeline rejoins at Stage 04 (G4..G7 per tier).
# ---------------------------------------------------------------------------
change_path:
  changes_dir: docs/harness/changes   # one dir per CHG-###: CHANGE.md + RECON.md
  recon_waivable: docs/typo-level only; waiver reason recorded in CHANGE.md
  effort_ceiling_days: 3              # beyond this after recon -> escalate to G1
  escalation_triggers:                # any "yes" exits the fast path
    - new external interface, data flow, or LLM touchpoint -> enter at G2
    - decision deviating from the codebase's existing pattern -> ADR before build
    - effort beyond ceiling -> enter at G1 (full PRD)
    - tier raised during recon -> re-approve intake at the new tier

# ---------------------------------------------------------------------------
# The verify loop. scripts/verify.sh runs these in order, fails fast.
# Empty string = skip step. Keep each step under ~2 minutes or split the suite.
# ---------------------------------------------------------------------------
verify:
  # This repo (the harness itself: Flask app + bash tooling). Adopting repos
  # replace these with their toolchain, e.g. Java: "mvn -q verify" · Python:
  # "mypy ." / "ruff check ." / "pytest" · Node: "npx tsc --noEmit" /
  # "npx eslint . --max-warnings 0" / "npx vitest run".
  typecheck: "python3 -m py_compile app/server.py"
  lint:      ".venv/bin/ruff check app tests && bash -n scripts/verify.sh scripts/gate-check.sh scripts/evidence-bundle.sh scripts/hooks/*.sh"
  test:      ".venv/bin/python -m pytest -q tests/ --cov=app --cov-fail-under=80"
  eval:      ""                          # REQUIRED if AI features exist (evalite / promptfoo / pytest-evals)
  build:     ""

# ---------------------------------------------------------------------------
# Maintenance lane & break-glass — the two defined pressure valves.
# ---------------------------------------------------------------------------
maintenance_lane:
  batch_id_format: MAINT-YYYY-MM
  cadence: monthly + ad-hoc when a High/Critical lands
  rides_the_batch: patch/minor bumps, clean changelog review, green verify
  always_ejected: [major versions, verify failures, auth/crypto/session/payment libraries, behavior changes in used paths]

break_glass:
  triggers_only: [exploit in the wild, active customer harm, hard external deadline]
  invoked_by: named human with authority (never the AI)
  at_the_time: [Part A record, peer eyes on diff, verify (degradation disclosed), DECISIONS.log at deploy]
  retrospective_deadline_business_days: 2
  every_use_triggers_retro: true

# ---------------------------------------------------------------------------
# Engineering standards thresholds — single source of the numbers.
# Human-readable register with enforcement mapping: docs/STANDARDS.md.
# Tool configs (JaCoCo/PIT, coverage.py/mutmut, vitest/Stryker, ruff/eslint,
# dependency-check/pip-audit/npm-audit) implement these; change both together.
# ---------------------------------------------------------------------------
standards:
  coverage_changed_lines_min_pct: 80     # STD-001
  mutation_score_min_pct: 80             # STD-002 (incremental/nightly mode ok)
  cognitive_complexity_max: 12           # STD-003
  dependency_vuln_block_at: high         # STD-004: high and critical block
  waiver_requires: [expiry_date, owner, DECISIONS.log entry]

# ---------------------------------------------------------------------------
# Data classification ceiling for prompt content. See docs/OPERATING-MODEL.md.
# ---------------------------------------------------------------------------
data:
  max_prompt_classification: Internal    # Public < Internal < Confidential < Restricted
  synthetic_data_only_in_tests: true

# ---------------------------------------------------------------------------
# Release policy consumed by /harness-release and scripts/evidence-bundle.sh
# ---------------------------------------------------------------------------
release:
  evidence_bundle_dir: docs/harness/evidence
  required_artifacts: [PRD, PLAN, verify-log, review-record, secure-gate-record]
  rollback_plan_required: true
